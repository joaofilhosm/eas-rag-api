<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAS API - Busca</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #00d9ff; font-size: 2em; }
        .header p { color: #666; margin-top: 8px; }
        .card { background: #14141f; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: #888; font-size: 13px; margin-bottom: 6px; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; background: #0a0a0f; border: 1px solid #2a2a3a; border-radius: 8px; color: #fff; font-size: 14px; }
        .input-group input:focus, .input-group textarea:focus { outline: none; border-color: #00d9ff; }
        .input-group textarea { min-height: 80px; resize: vertical; }
        .btn { padding: 12px 24px; background: #00d9ff; border: none; border-radius: 8px; color: #0a0a0f; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: #00b8d9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: #2a2a3a; color: #00d9ff; }
        .btn-secondary:hover { background: #3a3a4a; }
        .status { display: flex; align-items: center; gap: 8px; padding: 10px; background: #1a1a25; border-radius: 6px; font-size: 13px; margin-top: 15px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.ok { background: #4ade80; }
        .dot.err { background: #f87171; }
        .results { margin-top: 20px; }
        .result-item { background: #0f0f18; border-radius: 8px; padding: 16px; margin-bottom: 12px; border-left: 3px solid #00d9ff; }
        .result-title { font-weight: 600; margin-bottom: 8px; color: #fff; }
        .result-meta { font-size: 12px; color: #888; margin-bottom: 10px; }
        .result-content { white-space: pre-wrap; line-height: 1.6; color: #ccc; max-height: 300px; overflow-y: auto; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 8px; }
        .badge-live { background: #4ade80; color: #0a0a0f; }
        .badge-kw { background: #fbbf24; color: #0a0a0f; }
        .empty { text-align: center; color: #666; padding: 40px; }
        .nav { text-align: center; margin-top: 30px; }
        .nav a { color: #666; text-decoration: none; margin: 0 15px; font-size: 13px; }
        .nav a:hover { color: #00d9ff; }
        .key-info { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; font-size: 12px; color: #666; }
        .key-info .change-key { color: #00d9ff; cursor: pointer; }
        .key-info .change-key:hover { text-decoration: underline; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: #14141f; border-radius: 12px; padding: 30px; max-width: 400px; width: 90%; }
        .modal h2 { color: #00d9ff; margin-bottom: 20px; }
        .modal .input-group { margin-bottom: 15px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons .btn { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>EAS API</h1>
            <p>Busca inteligente em Fitness, Hipertrofia & Saude</p>
        </div>

        <div class="card">
            <div class="input-group">
                <textarea id="query" placeholder="Ex: como usar testosterona para ganho de massa?"></textarea>
            </div>
            <button class="btn" onclick="search()" id="searchBtn">Buscar</button>

            <div class="key-info">
                <span>🔑 API Key ativa</span>
                <span class="change-key" onclick="openModal()">Criar nova key</span>
            </div>

            <div class="status" id="status">
                <div class="dot"></div>
                <span>Verificando...</span>
            </div>
        </div>

        <div class="results" id="results"></div>

        <div class="nav">
            <a href="/docs">Swagger</a>
            <a href="/redoc">ReDoc</a>
            <a href="/lovable">Lovable Prompt</a>
        </div>
    </div>

    <!-- Modal para criar nova key -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>Criar Nova API Key</h2>
            <div class="input-group">
                <label>Master Key</label>
                <input type="password" id="masterKey" placeholder="Digite a Master Key">
            </div>
            <div class="input-group">
                <label>Nome da Key (opcional)</label>
                <input type="text" id="keyName" placeholder="Ex: Minha Key">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                <button class="btn" onclick="createKey()">Criar Key</button>
            </div>
        </div>
    </div>

    <script>
        const baseUrl = window.location.origin;
        // API Key padrao (inserida automaticamente)
        let apiKey = 'eas_aee057cb46a64e7ee8e2c47a8af3ce58';

        checkHealth();

        function openModal() {
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function checkHealth() {
            const status = document.getElementById('status');
            const dot = status.querySelector('.dot');
            const text = status.querySelector('span');
            try {
                const res = await fetch(baseUrl + '/api/v1/health');
                const data = await res.json();
                dot.className = 'dot ok';
                text.textContent = 'API Online - ' + data.service + ' | ' + await getKnowledgeCount() + ' itens na base';
            } catch (e) {
                dot.className = 'dot err';
                text.textContent = 'API Offline';
            }
        }

        async function getKnowledgeCount() {
            try {
                const res = await fetch(baseUrl + '/api/v1/health');
                return '209+'; // Placeholder enquanto nao tem endpoint publico
            } catch {
                return '?';
            }
        }

        async function search() {
            const query = document.getElementById('query').value.trim();
            const limit = 5;
            const btn = document.getElementById('searchBtn');
            const results = document.getElementById('results');

            if (!query) {
                results.innerHTML = '<div class="empty">Digite uma pergunta</div>';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Buscando...';
            results.innerHTML = '<div class="empty">Buscando na base de conhecimento...</div>';

            try {
                const res = await fetch(baseUrl + '/api/v1/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
                    body: JSON.stringify({ query, limit })
                });
                const data = await res.json();

                if (res.status === 401) {
                    results.innerHTML = '<div class="result-item" style="border-color:#f87171"><div style="color:#f87171">API Key invalida!</div><div style="margin-top:10px;color:#888">Clique em "Criar nova key" para gerar uma nova.</div></div>';
                } else if (data.results && data.results.length > 0) {
                    showResults(data);
                } else {
                    results.innerHTML = '<div class="empty">Nenhum resultado encontrado para "' + query + '"</div>';
                }
            } catch (e) {
                results.innerHTML = '<div class="result-item" style="border-color:#f87171"><div style="color:#f87171">Erro: ' + e.message + '</div></div>';
            }

            btn.disabled = false;
            btn.textContent = 'Buscar';
        }

        function showResults(data) {
            const results = document.getElementById('results');
            const searchType = data.search_type || 'keyword';
            const isLive = searchType === 'live_search';

            let html = '';
            data.results.forEach((r, i) => {
                const badge = isLive ? '<span class="badge badge-live">LIVE SCRAPE</span>' : '<span class="badge badge-kw">BASE</span>';
                const sim = Math.round((r.similarity || 1) * 100);
                const content = r.knowledge.conteudo.substring(0, 500) + (r.knowledge.conteudo.length > 500 ? '...' : '');

                html += '<div class="result-item">';
                html += '<div class="result-title">' + (i+1) + '. ' + r.knowledge.titulo + badge + '</div>';
                html += '<div class="result-meta">Similaridade: ' + sim + '%';
                if (r.knowledge.categoria) html += ' | Categoria: ' + r.knowledge.categoria;
                if (r.knowledge.url_original) html += ' | <a href="' + r.knowledge.url_original + '" target="_blank" style="color:#00d9ff">Fonte</a>';
                html += '</div>';
                html += '<div class="result-content">' + content + '</div>';
                html += '</div>';
            });
            results.innerHTML = html;
        }

        async function createKey() {
            const masterKey = document.getElementById('masterKey').value.trim();
            const keyName = document.getElementById('keyName').value.trim() || 'Playground Key';
            const results = document.getElementById('results');

            if (!masterKey) {
                alert('Digite a Master Key');
                return;
            }

            try {
                const res = await fetch(baseUrl + '/api/v1/api-keys', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': masterKey },
                    body: JSON.stringify({ name: keyName })
                });
                const data = await res.json();

                if (data.key) {
                    apiKey = data.key;
                    closeModal();
                    alert('Nova API Key criada: ' + data.key + '\n\nJa esta ativada para uso!');
                } else {
                    alert('Erro: ' + JSON.stringify(data));
                }
            } catch (e) {
                alert('Erro: ' + e.message);
            }
        }

        document.getElementById('query').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                search();
            }
        });

        // Fecha modal ao clicar fora
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
